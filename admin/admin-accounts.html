<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Akun Roblox - Qyuya Store</title>

    <link rel="stylesheet" href="admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="top">

<h1>QYUYASTORE</h1>

<p>Dashboard Akun Roblox</p>

<div class="top-menu">

    <button onclick="location.href='dashboard.html'">
        📦 Dashboard
    </button>

    <button class="active">
        👤 Akun Roblox
    </button>

    <button onclick="logout()">
        🚪 Logout
    </button>

</div>

</header>

<div class="search">
    <input
        id="searchAccount"
        type="text"
        placeholder="Cari akun Roblox...">
</div>

<div class="add-account">
    <button onclick="openModal()">
      ➕ Tambah Akun
    </button>
</div>


<!-- TEMPAT LIST AKUN -->
<div id="accounts" class="accounts">

</div>


<div id="accountModal" class="modal">

    <div class="modal-box">

        <h2 id="modalTitle">Tambah Akun Roblox</h2>

        <input id="accUsername"
        type="text"
        placeholder="Username Roblox">

        <input id="accPassword"
        type="text"
        placeholder="Password">

        <input id="accRobux"
        type="text"
        placeholder="Jumlah Robux"
        inputmode="numeric">

        <select id="accStatus">
            <option>Belum Limit</option>
            <option>Sudah Limit</option>
        </select>


        <div class="modal-buttons">

            <button onclick="saveAccount()">
                💾 Simpan
            </button>

            <button onclick="closeModal()">
                ❌ Batal
            </button>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>

</body>
</html>
